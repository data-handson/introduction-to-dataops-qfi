name: Deploy Microsoft Fabric Items

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - prd

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  deploy-notebooks:
    name: Deploy Notebooks (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set workspace name
        id: workspace
        run: |
          ENV="${{ inputs.environment }}"
          echo "name=[HANDS-ON] {trigram} Workspace - ${ENV^^}" >> "$GITHUB_OUTPUT"

      - name: Install fab CLI
        run: |
          pip install ms-fabric-cli

      - name: Login to Microsoft Fabric
        run: |
          fab config set encryption_fallback_enabled true
          fab auth login \
            -u ${{ secrets.SPN_CLIENT_ID }} \
            -p ${{ secrets.SPN_CLIENT_SECRET }} \
            --tenant ${{ secrets.SPN_TENANT_ID }}

      - name: Deploy Fabric Items
        run: |
          fab import "/${{ steps.workspace.outputs.name }}.Workspace/nb_demo.Notebook" \
            -i src/fabric/nb_demo.Notebook \
            -f --format .py